<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.7);
  z-index: -1;
}

/* NAV */
.nav {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  padding: 16px 20px;
  position: relative;
}

.nav h3 {
  margin: 0;
  font-size: 1rem;
}

.nav-links {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.nav-links a {
  text-decoration: none;
  color: black;
  font-size: 0.95rem;
  padding: 6px 2px;
}

.nav-links a:hover {
  color: #6366f1;
}

.menu-icon {
  display: none;
  font-size: 26px;
  cursor: pointer;
  justify-self: end;
  user-select: none;
  padding: 4px 8px;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
  padding: 0 16px 40px;
}

.box {
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  width: 700px;
  max-width: 100%;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.box a {
  color: #6366f1;
}

/* MOBILE */
@media (max-width: 600px) {
  .nav {
    grid-template-columns: 1fr auto;
    align-items: center;
  }

  .menu-icon {
    display: block;
  }

  .nav-links {
    display: none;
    flex-direction: column;
    gap: 0;
    background: white;
    position: absolute;
    top: 60px;
    right: 16px;
    left: 16px;
    padding: 10px 0;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    z-index: 100;
  }

  .nav-links.show {
    display: flex;
  }

  .nav-links a {
    padding: 12px 20px;
    border-bottom: 1px solid #f1f5f9;
    text-align: left;
  }

  .nav-links a:last-child {
    border-bottom: none;
  }

  .box {
    padding: 20px 16px;
  }

  .box h2 {
    font-size: 1.3rem;
  }

  .box p {
    font-size: 0.95rem;
    word-break: break-word;
  }
}
</style>
</head>

<body>

<div class="nav">
  <h3>Vijayasri Camarushi</h3>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home 🏠</a>
    <a href="about.html">About 👤</a>
    <a href="portfolio.html">Portfolio 💼</a>
    <a href="contact.html">Contact 📞</a>
  </div>

  <div class="menu-icon" onclick="toggleMenu()" id="menuIcon">☰</div>
</div>

<div class="container">
  <div class="box">

    <h2>Contact 📞</h2>

    <p>Email: vijayasri.c25@iiits.in</p>

    <p>
      <a href="https://www.linkedin.com/in/vijaya-sri-camarushi-58b9a537b/" target="_blank">
        LinkedIn Profile
      </a>
    </p>

    <p>Open to research collaborations and opportunities 🚀</p>

  </div>
</div>

<script>
function toggleMenu() {
  var links = document.getElementById('navLinks');
  var icon = document.getElementById('menuIcon');
  links.classList.toggle('show');
  icon.textContent = links.classList.contains('show') ? '✕' : '☰';
}

document.addEventListener('click', function(e) {
  var nav = document.querySelector('.nav');
  if (!nav.contains(e.target)) {
    document.getElementById('navLinks').classList.remove('show');
    document.getElementById('menuIcon').textContent = '☰';
  }
});
</script>

</body>
</html>
